<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@freedraw/diagram — markdown viewer</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1f2937;
      }
      body {
        margin: 0;
        display: grid;
        grid-template-columns: 1fr 1fr;
        height: 100vh;
      }
      .pane {
        padding: 1.5rem;
        overflow: auto;
      }
      .pane.editor {
        border-right: 1px solid #e5e7eb;
        background: #fafafa;
      }
      h1 {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #6b7280;
        margin: 0 0 0.75rem;
      }
      textarea {
        width: 100%;
        height: calc(100% - 2rem);
        resize: none;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        padding: 0.75rem;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        line-height: 1.6;
      }
      .block {
        margin-bottom: 1.5rem;
      }
      .block canvas {
        max-width: 100%;
        border: 1px solid #e5e7eb;
        border-radius: 0.5rem;
        background: #fff;
      }
      .error {
        color: #dc2626;
        font-family: ui-monospace, monospace;
        font-size: 0.8rem;
        white-space: pre-wrap;
      }
      p {
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <div class="pane editor">
      <h1>Markdown</h1>
      <textarea id="source" spellcheck="false"></textarea>
    </div>
    <div class="pane">
      <h1>Rendered</h1>
      <div id="output"></div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
