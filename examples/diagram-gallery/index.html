<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@freedraw/diagram — gallery</title>
    <style>
      :root {
        font-family: system-ui, sans-serif;
        color: #1f2937;
      }
      body {
        margin: 0;
        padding: 2rem;
        background: #f3f4f6;
      }
      header {
        max-width: 80rem;
        margin: 0 auto 2rem;
      }
      header h1 {
        margin: 0 0 0.5rem;
        font-size: 1.4rem;
      }
      header p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
      }
      .grid {
        max-width: 80rem;
        margin: 0 auto;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(20rem, 1fr));
        gap: 1.5rem;
      }
      .card {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        padding: 1rem;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }
      .card h2 {
        margin: 0;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #6b7280;
      }
      .card .surface {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 8rem;
      }
      .card canvas {
        max-width: 100%;
        height: auto;
      }
      .card pre {
        margin: 0;
        font-family: ui-monospace, monospace;
        font-size: 0.72rem;
        line-height: 1.5;
        color: #374151;
        background: #f9fafb;
        border-radius: 0.5rem;
        padding: 0.6rem 0.75rem;
        overflow: auto;
        white-space: pre;
      }
      .error {
        color: #dc2626;
        font-family: ui-monospace, monospace;
        font-size: 0.75rem;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>@freedraw/diagram gallery</h1>
      <p>
        A spread of diagrams rendered through <code>@freedraw/diagram</code> — every direction, shape, and edge style.
        Use it to eyeball that arrows connect along the layout's main axis and that nothing routes the wrong way.
      </p>
    </header>
    <div class="grid" id="grid"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
