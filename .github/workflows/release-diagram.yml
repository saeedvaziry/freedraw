name: Release diagram

on:
  push:
    tags:
      - 'diagram-v*'

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: '22'
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci --ignore-scripts

      - name: Verify tag matches package version
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#diagram-v}"
          PKG_VERSION="$(node -p "require('./packages/diagram/package.json').version")"
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            exit 1
          fi

      - name: Build
        run: npm run build --workspace @freedraw/diagram

      - name: Test
        run: npm run test --workspace @freedraw/diagram

      - name: Publish
        run: npm publish --workspace @freedraw/diagram
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
